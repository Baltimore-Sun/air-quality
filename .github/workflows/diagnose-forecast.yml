name: Diagnose Maryland AQI forecast (manual)

on:
  workflow_dispatch: {} # manual only -- run this from the Actions tab when investigating a discrepancy

permissions:
  contents: write

jobs:
  diagnose-forecast:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch raw AirNow forecast fields
        env:
          AIRNOW_API_KEY: ${{ secrets.AIRNOW_API_KEY }}
        run: node scripts/diagnose-airnow-forecast.js

      - name: Commit debug CSV if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/maryland-forecast-debug.csv
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update AirNow forecast diagnostic dump"
          git push
