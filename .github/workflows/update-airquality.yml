name: Update Maryland air quality data

on:
  schedule:
    # Runs at the top of every hour (UTC). GitHub may delay this by a few
    # minutes during busy periods, which is fine for hourly AQI data.
    - cron: "0 * * * *"
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

permissions:
  contents: write # needed so the workflow can commit the updated file

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest AirNow data
        env:
          AIRNOW_API_KEY: ${{ secrets.AIRNOW_API_KEY }}
        run: node scripts/fetch-airnow.js

      - name: Commit updated GeoJSON if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/maryland-airnow.geojson
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update Maryland AQI data"
          git push
